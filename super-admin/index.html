<!DOCTYPE html>
<html>
<head>
  <title>Super Admin</title>
</head>

<body>

<h1>Super Admin Panel</h1>

<h2>Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">
  Login
</button>

<hr>

<h2>Create Organization</h2>

<input id="orgName" placeholder="Organization Name">

<button onclick="createOrganization()">
  Create Organization
</button>

<hr>

<h2>Organizations</h2>

<button onclick="loadOrganizations()">
  Load Organizations
</button>

<ul id="organizations"></ul>

<script>

async function login() {

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  const response = await fetch(
    "http://localhost:5000/super/login",
    {
      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        email,
        password
      })
    }
  );

  const data = await response.json();

  if (data.success) {

    alert("Login Successful");

  } else {

    alert("Invalid Credentials");
  }
}

async function createOrganization() {

  const name =
    document.getElementById("orgName").value;

  const response = await fetch(
    "http://localhost:5000/super/organizations",
    {
      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({ name })
    }
  );

  const data = await response.json();

  console.log(data);

  alert("Organization Created");
}

async function loadOrganizations() {

  const response = await fetch(
    "http://localhost:5000/super/organizations"
  );

  const organizations = await response.json();

  const list =
    document.getElementById("organizations");

  list.innerHTML = "";

  organizations.forEach(org => {

    const li = document.createElement("li");

    li.innerText =
      `${org.name} - ${org._id}`;

    list.appendChild(li);
  });
}

</script>

</body>
</html>
